        <section id="photography">
            <h2 class="section-title">Photography</h2>

            <div class="photography-gallery">
                <!-- Bức ảnh 1 -->
                <figure class="photo-card">
                    <img src="Tu Duc Tomb.JPG" alt="Tu Duc Tomb">
                    <figcaption>
                    <div class="photo-meta">Hue, 2024</div>
                    <p class="photo-story"></p>
                    </figcaption>
                </figure>

                <!-- Bức ảnh 2 (Cứ thế copy nhân bản lên) -->
                <figure class="photo-card">
                    <img src="Trung Luong.JPEG" alt="Dawn on beach">
                    <figcaption>
                    <div class="photo-meta">Quy Nhon, 2024</div>
                    <p class="photo-story">Beach at dawn</p>
                    </figcaption>
                </figure>

                <figure class="photo-card">
                    <img src="Nhon Ly.JPEG" alt="Nhon Ly">
                    <figcaption>
                    <div class="photo-meta">Nhon Ly, 2026</div>
                    <p class="photo-story"></p>
                    </figcaption>
                </figure>                

                <figure class="photo-card">
                    <img src="Rice Field.JPEG" alt="Tên ảnh 2">
                    <figcaption>
                    <div class="photo-meta">Trung Luong, 2026</div>
                    <p class="photo-story"></p>
                    </figcaption>
                </figure>
            </div>
