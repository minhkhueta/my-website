      <div class="nav-left">

      <div class="nav-right">
        <a href="home.html">Home</a>

        <!-- > <a href="writing.html">Writing</a> -->
        <a href="interest.html">Interests</a>

      </div>
    </nav>

    <!-- WRITING CONTENT -->
    <section id="writing">
      <div class="section-content">
        <h2>Writing & Thoughts</h2>

        <p class="section-desc">This is where I share my views and thoughts on many aspects of life. </p>
     
        <div class="list">

          <div class="list-row">
            <span class="list-year">01</span>
            <div class="list-right">
              <a>ABC</a>
              <p>Abstract</p>
            </div>
          </div>

          <div class="list-row">
            <span class="list-year">02</span>
            <div class="list-right">
              <a>XYZ</a>
              <p>Abstract</p>
            </div>
          </div>

        </div>
      </div>
    </section>

    <script>
      let lastScroll = 0;

      window.addEventListener('scroll', function() {
        const currentScroll = window.scrollY;

        if (currentScroll > lastScroll && currentScroll > 80) {
          // đang scroll xuống → ẩn nav
          document.querySelector('nav').classList.add('hidden');
        } else {
          // đang scroll lên → hiện nav
          document.querySelector('nav').classList.remove('hidden');
        }

        lastScroll = currentScroll;
      });
    </script>

  </body>
</html>
